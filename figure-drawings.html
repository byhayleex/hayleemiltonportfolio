    <!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <button class="lightbox__close" id="lightbox-close">&times;</button>
    <img class="lightbox__img" id="lightbox-img" src="" alt="">
    <p class="lightbox__caption" id="lightbox-caption"></p>
</div>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCaption = document.getElementById('lightbox-caption');
        const lightboxClose = document.getElementById('lightbox-close');

        // open lightbox when any gallery image is clicked
        document.querySelectorAll('.prints__item img').forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src;
                lightboxImg.alt = img.alt;
                lightboxCaption.textContent = img.closest('figure').querySelector('figcaption').textContent;
                lightbox.classList.add('active');
            });
        });

        // close on X button or clicking outside the image
        lightboxClose.addEventListener('click', () => lightbox.classList.remove('active'));
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) lightbox.classList.remove('active');
        });

        // close with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') lightbox.classList.remove('active');
        });
    </script>
