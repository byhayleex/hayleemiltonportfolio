<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <button class="lightbox__close" id="lightbox-close">&times;</button>

    <!-- regular image view -->
    <img class="lightbox__img" id="lightbox-img" src="" alt="">

    <!-- pdf view -->
    <iframe class="lightbox__pdf" id="lightbox-pdf" src=""></iframe>

    <p class="lightbox__caption" id="lightbox-caption"></p>
</div>

<script>
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxPdf = document.getElementById('lightbox-pdf');
    const lightboxCaption = document.getElementById('lightbox-caption');
    const lightboxClose = document.getElementById('lightbox-close');

    document.querySelectorAll('.prints__item img').forEach(img => {
        img.addEventListener('click', () => {
            const figure = img.closest('figure');
            const pdf = figure.getAttribute('data-pdf');
            const title = figure.querySelector('figcaption').textContent;
            const description = img.getAttribute('data-description') || '';

            lightboxCaption.innerHTML = `<strong>${title}</strong><br>${description}`;

            if (pdf) {
                // show PDF, hide image
                lightboxPdf.src = pdf;
                lightboxPdf.style.display = 'block';
                lightboxImg.style.display = 'none';
            } else {
                // show image, hide PDF
                lightboxImg.src = img.src;
                lightboxImg.alt = img.alt;
                lightboxImg.style.display = 'block';
                lightboxPdf.style.display = 'none';
            }

            lightbox.classList.add('active');
        });
    });

    lightboxClose.addEventListener('click', () => {
        lightbox.classList.remove('active');
        lightboxPdf.src = ''; // stops the PDF loading in background when closed
    });
    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) {
            lightbox.classList.remove('active');
            lightboxPdf.src = '';
        }
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            lightbox.classList.remove('active');
            lightboxPdf.src = '';
        }
    });
</script>
